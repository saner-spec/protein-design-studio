version: "3.8"

services:
  protein-studio:
    build: .
    container_name: protein-studio
    ports:
      - "8899:8899"
    volumes:
      # 模型缓存 (持久化，避免每次重建下载2.5GB)
      - esm_models:/app/data/esm_models
      # PDB缓存
      - pdb_cache:/app/data/pdb_cache
      # 校准数据
      - ./data/calibrations:/app/data/calibrations
      # 知识缓存
      - ./data/knowledge:/app/data/knowledge
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    restart: unless-stopped

volumes:
  esm_models:
  pdb_cache:
